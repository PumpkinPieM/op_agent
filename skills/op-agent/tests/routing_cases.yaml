schema_version: "1.1.0"
cases:
  - id: "cpu_plugin_default"
    title: "CPU default route dispatches to plugin builder"
    input:
      api_name: "mindspore.mint.abs"
      target_backend_raw: "CPU"
      problem_type: "operator-gap"
      known_evidence: "The operator is missing on CPU. No specific integration requirement provided."
    expected:
      normalized_backend: "CPU"
      best_fit: "cpu-plugin-builder"
      handoff_skill: "cpu-plugin-builder"
      handoff_task: "Implement the missing CPU operator through the plugin path."
      start_now: true
      forbid_codegen: true

  - id: "cpu_native_override"
    title: "CPU native requirement dispatches to native builder"
    input:
      api_name: "mindspore.mint.xxx"
      target_backend_raw: "CPU"
      problem_type: "operator-gap"
      known_evidence: "The user explicitly requires deep framework integration inside MindSpore core."
    expected:
      normalized_backend: "CPU"
      best_fit: "cpu-native-builder"
      handoff_skill: "cpu-native-builder"
      handoff_task: "Implement the missing CPU operator inside MindSpore core."
      start_now: true
      forbid_codegen: true

  - id: "npu_alias_ascend"
    title: "Ascend alias normalizes to NPU and dispatches to ACLNN builder"
    input:
      api_name: "mindspore.mint.mul"
      target_backend_raw: "Ascend"
      problem_type: "operator-gap"
      known_evidence: "This is an ACLNN-based implementation task."
    expected:
      normalized_backend: "NPU"
      best_fit: "aclnn-builder"
      handoff_skill: "aclnn-builder"
      handoff_task: "Implement the Ascend ACLNN adaptation end to end."
      start_now: true
      forbid_codegen: true

  - id: "npu_alias_aclnn"
    title: "aclnn alias normalizes to NPU and dispatches to ACLNN builder"
    input:
      api_name: "mindspore.mint.sub"
      target_backend_raw: "aclnn"
      problem_type: "operator-gap"
      known_evidence: "The task is framed as an aclnn adaptation."
    expected:
      normalized_backend: "NPU"
      best_fit: "aclnn-builder"
      handoff_skill: "aclnn-builder"
      handoff_task: "Implement the Ascend ACLNN adaptation end to end."
      start_now: true
      forbid_codegen: true

  - id: "gpu_direct_route"
    title: "GPU route dispatches directly to GPU builder"
    input:
      api_name: "mindspore.mint.xxx"
      target_backend_raw: "GPU"
      problem_type: "operator-gap"
      known_evidence: "The operator is unsupported on GPU."
    expected:
      normalized_backend: "GPU"
      best_fit: "gpu-builder"
      handoff_skill: "gpu-builder"
      handoff_task: "Implement the missing GPU operator with the GPU builder."
      start_now: true
      forbid_codegen: true

  - id: "cpu_ambiguity_defaults_to_plugin"
    title: "CPU ambiguity still dispatches to plugin builder by default"
    input:
      api_name: "mindspore.ops.CustomOp"
      target_backend_raw: "CPU"
      problem_type: "operator-gap"
      known_evidence: "Unsupported on CPU."
    expected:
      normalized_backend: "CPU"
      best_fit: "cpu-plugin-builder"
      handoff_skill: "cpu-plugin-builder"
      handoff_task: "Implement the missing CPU operator through the plugin path."
      start_now: true
      forbid_codegen: true

  - id: "npu_mint_api"
    title: "mint API on NPU dispatches to ACLNN builder"
    input:
      api_name: "mindspore.mint.abs"
      target_backend_raw: "NPU"
      problem_type: "operator-gap"
      known_evidence: ""
    expected:
      normalized_backend: "NPU"
      best_fit: "aclnn-builder"
      handoff_skill: "aclnn-builder"
      handoff_task: "Implement the mint API adaptation with the ACLNN builder."
      start_now: true
      forbid_codegen: true
