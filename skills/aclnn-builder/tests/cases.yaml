schema_version: "1.0.0"
defaults:
  artifact_globs:
    - "*_Feature.md"
    - "*_pta_analysis.md"
    - "*_callchain_analysis.md"
cases:
  - id: "example_aclnn_abs"
    enabled: false
    description: "Template case showing the contract for a real aclnn-builder skill run."
    timeout_sec: 1800
    prompt: |
      Use {{skill:aclnn_builder}} to adapt `mindspore.mint.abs` end to end. Just code generation, don't compile.

      Operate only on the isolated MindSpore checkout prepared for this task:
      - target repo: {{repo:mindspore}}
      - op-plugin repo: {{op_plugin_dir}}

      Put progress-tracing and validation markdown artifacts under {{artifact_dir}} when possible.
    repos:
      - name: "mindspore"
        ref: "HEAD"
        isolation: "git-worktree"
        expected_changes:
          added:
            - "mindspore/ops/op_def/yaml/abs_op.yaml"
            - "tests/ut/cpp/ops/test_ops_abs.cc"
          modified: []
          deleted: []
  - id: "celu"
    enabled: true
    description: "celu, no mint, have primitive; auto dispatch to be added."
    timeout_sec: 1800
    prompt: |
      Use {{skill:aclnn_builder}} to adapt `mindspore.mint.nn.functional.celu` end to end. Just code generation, don't compile.

      Operate only on the isolated MindSpore checkout prepared for this task:
      - target repo: {{repo:mindspore}}
      - op-plugin repo: {{op_plugin_dir}}

      Put progress-tracing and validation markdown artifacts under {{artifact_dir}} when possible.
    repos:
      - name: "mindspore"
        ref: "HEAD"
        isolation: "git-worktree"
        expected_changes:
          added:
            - "docs/api/api_python/mint/mindspore.mint.nn.functional.celu.rst"
          modified:
            - "mindspore/ops/op_def/yaml/celu_op.yaml"
            - "mindspore/python/mindspore/mint/nn/functional.py"
            - "docs/api/api_python/mindspore.mint.rst"
            - "docs/api/api_python_en/mindspore.mint.rst"
          deleted: []
  - id: "range"
    enabled: true
    description: "range, have primitive that doesn't match aclnn; _ext op to be added with customized kernel"
    timeout_sec: 1800
    prompt: |
      Use {{skill:aclnn_builder}} to adapt `mindspore.mint.range` end to end. Just code generation, don't compile.

      Operate only on the isolated MindSpore checkout prepared for this task:
      - target repo: {{repo:mindspore}}
      - op-plugin repo: {{op_plugin_dir}}

      Put progress-tracing and validation markdown artifacts under {{artifact_dir}} when possible.
    repos:
      - name: "mindspore"
        ref: "HEAD"
        isolation: "git-worktree"
        expected_changes:
          added: 
            - "mindspore/ops/op_def/yaml/range_ext_op.yaml"
            - "docs/api/api_python/mint/mindspore.mint.func_range.rst"
            - "mindspore/ops/kernel/ascend/aclnn/kernel_mod_impl/customize/range_ext_aclnn_kernel.cc"
            - "mindspore/ops/kernel/ascend/aclnn/kernel_mod_impl/customize/range_ext_aclnn_kernel.h"
            - "mindspore/ops/kernel/ascend/aclnn/pyboost_impl/customize/range_ext.cc"
            - "mindspore/ops/kernel/ascend/aclnn/pyboost_impl/customize/range_ext.h"
            - "mindspore/ops/op_def/yaml/doc/range_ext_doc.yaml"
            - "tests/ut/cpp/ops/test_ops_range_ext.cc"
          modified:
            - "mindspore/python/mindspore/mint/__init__.py"
          deleted: []
  - id: "tensor_aminmax"
    enabled: true
    description: | 
      Tensor.aminmax, existing, no primitive, calling min/max/argmin/argmax for now; primitive to be added with customized kernel.
      Customize kernel should call argmin/argmax in cases.
      Bprop logic needs to be added. Old tensor method in tensor.py needs to be removed.
      Difficult case.
    timeout_sec: 1800
    prompt: |
      Use {{skill:aclnn_builder}} to adapt `Tensor.aminmax` for aclnn kernel end to end. Just code generation, don't compile.

      Operate only on the isolated MindSpore checkout prepared for this task:
      - target repo: {{repo:mindspore}}
      - op-plugin repo: {{op_plugin_dir}}

      Put progress-tracing and validation markdown artifacts under {{artifact_dir}} when possible.
    repos:
      - name: "mindspore"
        ref: "HEAD"
        isolation: "git-worktree"
        expected_changes:
          added: 
            - "mindspore/ops/op_def/yaml/aminmax_op.yaml"
            - "mindspore/ops/api_def/aminmax.yaml"
            - "mindspore/ops/op_def/yaml/doc/aminmax_doc.yaml"
            - "mindspore/ops/api_def/method_doc/aminmax_doc.yaml"
            - "mindspore/ops/kernel/ascend/aclnn/kernel_mod_impl/customize/aminmax_aclnn_kernel.cc"
            - "mindspore/ops/kernel/ascend/aclnn/kernel_mod_impl/customize/aminmax_aclnn_kernel.h"
            - "mindspore/ops/kernel/ascend/aclnn/pyboost_impl/customize/aminmax.cc"
            - "mindspore/ops/kernel/ascend/aclnn/pyboost_impl/customize/aminmax.h"
            - "tests/ut/cpp/ops/test_ops_aminmax.cc"
          modified:
            - "mindspore/ccsrc/frontend/expander/grad/grad_math_ops.cc"
            - "mindspore/python/mindspore/common/tensor.py"
          deleted: []
