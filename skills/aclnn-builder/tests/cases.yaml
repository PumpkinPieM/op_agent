schema_version: "1.0.0"
defaults:
  artifact_globs:
    - "*_Feature.md"
    - "*_pta_analysis.md"
    - "*_callchain_analysis.md"
cases:
  - id: "adaptivemaxpool3d"
    enabled: true
    description: | 
      mint.nn.functional.adaptive_max_pool3d, old python primitive exists.
      op_def (also for grad) to be added with customized kernel.

      Tag: no yaml, customized kernel, bprop

      Difficulty: medium
    timeout_sec: 1800
    prompt: |
      Use {{skill:aclnn_builder}} to adapt `mint.nn.functional.adaptive_max_pool3d` for aclnn kernel end to end. Just code generation, don't compile.

      Operate only on the isolated MindSpore checkout prepared for this task:
      - target repo: {{repo:mindspore}}
      - op-plugin repo: {{op_plugin_dir}}

      Put progress-tracing and validation markdown artifacts under {{artifact_dir}} when possible.
    repos:
      - name: "mindspore"
        ref: "HEAD"
        isolation: "git-worktree"
        expected_changes:
          added: 
            - "mindspore/ops/op_def/yaml/adaptive_max_pool3d_ext_op.yaml"
            - "mindspore/ops/op_def/yaml/adaptive_max_pool3d_grad_ext_op.yaml"
            - "mindspore/ops/infer/ops_func_impl/adaptive_max_pool3d_ext.cc"
            - "mindspore/ops/infer/ops_func_impl/adaptive_max_pool3d_grad_ext.cc"
            - "tests/ut/cpp/ops/test_ops_adaptive_max_pool3d_ext.cc"
          modified:
            - "mindspore/python/mindspore/mint/nn/functional.py"
            - "docs/api/api_python/mindspore.mint.rst"
            - "docs/api/api_python_en/mindspore.mint.rst"
          deleted: []
